task: building_seg

tiling:
  engine:
    pan_dirname: PAN
    gt_dirname: GT-Mask
    context_dirname: Context
    target_size_m: 100.0
    overlap: 0.5
    reflectance_max: 10000
    context_max_side_cap: null
    verbose: false
    skip_tiles_with_nodata: true

  adapter:
    class_of_interest_id: 1
    shadow_id: 2
    emit_shadow: true
    min_change_pixels: 1

  policy:
    kind: regular
    gt_presence_threshold: 0.001
    require_presence: true
    details_prefix: presence__

  meta:
    csv_name_default: building_tiles_regular.csv

splitting:
  engine:
    policy: grouped
    seed: 1337
    splits:
      train: 0.5
      val: 0.5

    group_col: region
    predefined_col: split
    
  outputs:
    prefix: tiles
    group_list_prefix: regions

training:
  engine:
    batch_size: 8
    num_workers: 4
    epochs: 5
    lr: 0.0001
    seed: 1337
    selection_metric: val/micro_f1
    selection_mode: max

  sampler:
    kind: policy
    include_col: sample__include

  dataset:
    reflectance_max: 10000
    use_context: true
    tile_out_channels: 1
    context_out_channels: 1
    cache_context: true
    context_cache_max_items: 256
    do_aug: true
    aug_flip: true
    aug_rot90: true
    aug_noise_std: 0.0

  model:
    add_coords: true
    expect_ctx: true
    tile_channels: 1
    ctx_channels: 1
    backbone:
      base_name: segformer_b0
      num_classes: 1
      image_size: 512

  loss:
    kind: bce
    foreground_label: 1
    pos_weight: null

  metrics:
    threshold: 0.5
    foreground_label: 1
    eps: 0.0000001

inference:
  engine:
    tile_size: 512
    stride: 256
    batch_size: 4
    seed: 1337
    save_probabilities: true
    save_logits: true

evaluation:
  threshold: 0.5
  foreground_label: 1
  eps: 0.0000001
  pareto_top_k: 50
  require_target: true

gating:
  gate_a:
    input: val
    decision_metric_scope: validation
    fail_on_missing: true
    allow_nan: false
    checks:
      - scope: val
        metric: micro_f1
        comparator: ">="
        threshold: 0.20
      - scope: val
        metric: iou
        comparator: ">="
        threshold: 0.15

  gate_b:
    gate_b:
    input: golden_test
    decision_metric_scope: golden_test
    fail_on_missing: true
    allow_nan: false
    checks:
      - scope: micro
        metric: f1
        comparator: ">="
        threshold: 0.30
      - scope: macro
        metric: f1
        comparator: ">="
        threshold: 0.24
      - scope: micro
        metric: iou
        comparator: ">="
        threshold: 0.18

registry:
  model_name: building_seg
  model_artifact_path: model
  candidate_alias: candidate
  production_alias: production
  archive_candidate_alias: false
  tracking_uri: http://127.0.0.1:5000
  registry_uri: null