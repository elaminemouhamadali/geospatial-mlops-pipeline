name: Demo Ray Local Cluster

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infra/ray-local/**"
      - "src/geo_mlops/core/execution/**"
      - "infra/ray-local/smoke_test.py"
      - ".github/workflows/demo-pipeline-ray.yml"

permissions:
  contents: read
  packages: read

jobs:
  demo-ray:
    name: Run Ray local cluster smoke demo
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker environment
        run: |
          docker version
          docker compose version
          df -h

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Prepare host output directories
        run: |
          mkdir -p outputs mlruns

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Ray image
        run: |
          docker compose -f infra/ray-local/docker-compose.yml pull -q

      - name: Start Ray local cluster
        run: |
          docker compose -f infra/ray-local/docker-compose.yml up -d

      - name: Show Ray containers after startup
        run: |
          docker compose -f infra/ray-local/docker-compose.yml ps -a

      - name: Wait for Ray dashboard
        run: |
          for i in {1..90}; do
            if curl -fsS http://127.0.0.1:8265/api/version >/dev/null; then
              echo "Ray dashboard is ready"
              exit 0
            fi
            sleep 2
          done

          echo "Ray failed to start"
          docker compose -f infra/ray-local/docker-compose.yml ps -a
          docker compose -f infra/ray-local/docker-compose.yml logs --tail=300
          exit 1

      - name: Run Ray smoke test inside Ray head
        run: |
          docker compose -f infra/ray-local/docker-compose.yml exec -T ray-head bash -lc '
            cd /workspace
            python infra/ray-local/smoke_test.py
          '

      - name: Capture Ray status
        if: always()
        run: |
          docker compose -f infra/ray-local/docker-compose.yml exec -T ray-head bash -lc '
            ray status || true
          ' > ray_status.txt || true

      - name: Save Ray compose logs
        if: always()
        run: |
          docker compose -f infra/ray-local/docker-compose.yml ps -a > ray_compose_ps.txt || true
          docker compose -f infra/ray-local/docker-compose.yml logs --tail=500 > ray_compose.log || true

      - name: Upload Ray demo artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ray-local-smoke-demo
          path: |
            ray_status.txt
            ray_compose_ps.txt
            ray_compose.log

      - name: Stop Ray cluster
        if: always()
        run: |
          docker compose -f infra/ray-local/docker-compose.yml down -v