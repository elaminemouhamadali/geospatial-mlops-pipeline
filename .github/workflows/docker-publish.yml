name: Docker Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docker/**"
      - "src/**"
      - "pyproject.toml"
      - "requirements*.txt"
      - "README.md"
      - ".github/workflows/docker-publish.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-slim:
    name: Build and push slim image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata for slim
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=slim
            type=raw,value=slim-${{ github.sha }}

      - name: Build and push slim image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.slim
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-ray-cpu:
    name: Build and push Ray CPU image
    runs-on: ubuntu-latest
    needs: build-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata for ray-cpu
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=ray-cpu
            type=raw,value=ray-cpu-${{ github.sha }}

      - name: Build and push Ray CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ray-cpu
          push: true
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}